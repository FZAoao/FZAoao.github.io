<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FZAoao links</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>FZAoao links</h1>
    <p class="subtitle">FZ 链接站</p>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索链接..." />
    </div>
  </header>

  <main id="app"></main>

  <footer>
    <p>FZAoao links &mdash; 2023 <span>by FZAoao</span></p>
  </footer>

  <script src="links.js"></script>
  <script>
    function render(data) {
      const app = document.getElementById('app');
      app.innerHTML = '';
      data.forEach(category => {
        const section = document.createElement('section');
        section.innerHTML = `<h2>${category.name}</h2><div class="card-grid"></div>`;
        const grid = section.querySelector('.card-grid');
        category.links.forEach(link => {
          const card = document.createElement('a');
          card.className = 'card';
          card.href = link.url;
          card.target = '_blank';
          card.rel = 'noopener noreferrer';
          card.innerHTML = `
            <div class="card-icon">${link.icon || '🔗'}</div>
            <div class="card-info">
              <span class="card-name">${link.name}</span>
              <span class="card-desc">${link.desc || ''}</span>
            </div>
          `;
          grid.appendChild(card);
        });
        app.appendChild(section);
      });
    }

    function filterLinks(query) {
      if (!query.trim()) {
        render(links);
        return;
      }
      const q = query.toLowerCase();
      const filtered = links.map(cat => ({
        ...cat,
        links: cat.links.filter(l =>
          l.name.toLowerCase().includes(q) ||
          (l.desc && l.desc.toLowerCase().includes(q)) ||
          (l.url && l.url.toLowerCase().includes(q))
        )
      })).filter(cat => cat.links.length > 0);
      render(filtered);
    }

    document.getElementById('searchInput').addEventListener('input', e => {
      filterLinks(e.target.value);
    });

    render(links);
  </script>
</body>
</html>
